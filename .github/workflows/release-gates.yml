name: Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  root-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Secret scan
        run: npm run secret:scan

      - name: Lint root
        run: npm run lint

      - name: Build root
        run: npm run build

      - name: Run tests
        run: npm run test

  functions-lint:
    runs-on: ubuntu-latest
    needs: root-quality-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Lint functions
        working-directory: functions
        run: npm run lint
